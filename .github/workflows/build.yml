name: Android CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build AAR
        run: ./gradlew :vcore:assembleRelease
      - name: Upload VCore Engine
        uses: actions/upload-artifact@v4
        with:
          name: VPhoneOS-Engine
          path: vcore/build/outputs/aar/*.aar
          