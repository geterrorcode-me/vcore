name: Build Engine
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build VCore AAR
        run: ./gradlew :vcore:assembleRelease

      - name: Upload Engine Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPhoneOS-Engine
          path: vcore/build/outputs/aar/*.aar
